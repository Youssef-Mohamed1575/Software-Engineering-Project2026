<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Home Sense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen font-['Inter'] overflow-hidden">

    <div class="bg-slate-900 p-10 rounded-[2rem] w-full max-w-md shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-slate-800 transform transition-all duration-500 hover:scale-[1.01]">
        <div class="text-center mb-12">
            <h1 class="font-['Yellowtail'] text-6xl text-white mb-3">Home Sense</h1>
            <p class="text-slate-400 font-light tracking-[0.2em] uppercase text-[10px]">Secure Smart Home Access</p>
        </div>

        <form id="loginForm" class="space-y-7">
            <div>
                <label for="username" class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2 ml-1">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full bg-slate-800/50 border border-slate-700 text-white px-5 py-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition-all placeholder-slate-600 shadow-inner"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-2 ml-1">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-slate-800/50 border border-slate-700 text-white px-5 py-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition-all placeholder-slate-600 shadow-inner"
                    placeholder="••••••••">
            </div>

            <div id="errorMessage"
                class="text-red-400 text-sm hidden text-center bg-red-400/10 py-3 rounded-xl border border-red-400/20">
                Invalid username or password
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-cyan-900/20 transform transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                <span class="tracking-wide">Sign In</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                </svg>
            </button>
        </form>

        <div class="mt-12 text-center">
            <p class="text-slate-500 text-xs italic font-light">
                &ldquo;Welcome home, where security meets comfort.&rdquo;
            </p>
        </div>
    </div>

    <script>
        // Ensure database is ready
        window.addEventListener('DOMContentLoaded', () => {
            fetch('api/migrations.php')
                .then(r => r.text())
                .then(d => console.log('DB Status:', d));
        });

        const loginForm = document.getElementById('loginForm');
        // Redirect if already logged in
        fetch('api/check_session.php')
            .then(res => res.json())
            .then(data => {
                if (data.loggedIn) window.location.href = 'dashboard.html';
            });

        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            const originalContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></span>';
            errorMessage.classList.add('hidden');

            const formData = new FormData(loginForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    errorMessage.textContent = result.message;
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'System error. Please try again.';
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        });
    </script>
</body>

</html>
