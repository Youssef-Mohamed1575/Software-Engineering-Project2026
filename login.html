<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Home Sense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-300 flex items-center justify-center min-h-screen font-['Inter'] overflow-hidden">
    
    <div class="bg-slate-800 p-10 rounded-3xl w-full max-w-md shadow-2xl border border-slate-100 transform transition-all duration-500 hover:scale-[1.01]">
        <div class="text-center mb-10">
            <h1 class="font-['Yellowtail'] text-5xl text-gray-300 mb-2">Home Sense</h1>
            <p class="text-slate-400 font-light tracking-widest uppercase text-xs">Secure Access Control</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-slate-600 text-sm font-medium mb-2">Username</label>
                <input type="text" id="username" name="username" required
                    class="w-full bg-slate-50 border border-slate-200 text-slate-900 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all placeholder-slate-400"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-slate-600 text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-slate-50 border border-slate-200 text-slate-900 px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-all placeholder-slate-400"
                    placeholder="••••••••">
            </div>

            <div id="errorMessage" class="text-red-500 text-sm hidden text-center bg-red-50 py-2 rounded-lg border border-red-100">
                Invalid username or password
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-white hover:bg-slate-700 text-white font-semibold py-4 rounded-xl shadow-lg transform transition-all active:scale-95 flex items-center justify-center gap-2">
                <span class = "text-slate-800">Sign In</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-slate-400 text-sm italic">
                "Welcome home, where security meets comfort."
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></span>';
            errorMessage.classList.add('hidden');

            const formData = new FormData(loginForm);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    errorMessage.textContent = result.message;
                    errorMessage.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span>Sign In</span><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'A system error occurred. Please try again.';
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Sign In</span>';
            }
        });
    </script>
</body>
</html>
