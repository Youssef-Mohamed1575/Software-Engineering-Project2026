<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Activity Log | Home Sense</title>
  <link href="https://fonts.googleapis.com/css2?family=Yellowtail&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body class="font-[Inter] bg-slate-50 min-h-screen flex flex-col">
  <!-- Header  -->
  <div
    class="fixed top-0 w-full h-[8%] z-40 bg-gradient-to-r from-slate-100 to-slate-300 text-black flex items-center px-4 gap-4 shadow-md">
    <div class="flex items-center justify-between w-full px-4">
      <div class="flex items-center gap-4">
        <button onclick="toggleSidebar()" class="p-2 rounded text-xl hover:bg-slate-200/50 transition">☰</button>
        <div class="text-3xl text-black" style="font-family: Yellowtail, cursive; font-weight: bold">
          <a href="dashboard.html" class="hover:opacity-80 transition">Home Sense</a>
        </div>
      </div>
      <div class="text-3xl font-extrabold flex items-center gap-4">
        Activity Log
      </div>
      <div class="flex items-center gap-5 text-black mr-8">
        <button class="transition-transform duration-200 hover:scale-110 active:scale-95 relative">
          <img src="icons and images/bell.png" class="h-9 w-9" />
        </button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar"
    class="fixed top-0 left-0 h-screen w-64 bg-slate-800 text-white -translate-x-full transition-transform duration-300 z-50 shadow-2xl">
    <div class="p-4 font-bold flex items-center gap-2 border-b border-slate-700">
      <button onclick="toggleSidebar()" class="p-2 rounded hover:bg-slate-700 transition">☰</button>
      Menu
    </div>

    <ul class="p-6 space-y-4">
      <li>
        <a href="dashboard.html"
          class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition font-medium">
          Dashboard
        </a>
      </li>
      <li>
        <a href="Household Managment.html"
          class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition font-medium">
          Household Management
        </a>
      </li>
      <li id="userPanelBtn" class="hidden">
        <a href="admin.html"
          class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition font-medium">
          User Panel
        </a>
      </li>
      <li id="activityLogBtn" class="hidden">
        <a href="activity_log.html"
          class="flex items-center gap-3 px-4 py-3 rounded-lg bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 transition font-medium">
          Activity Log
        </a>
      </li>
      <li id="LogOutBtn">
        <a href="index.html" onclick="logoutUser(); return false;"
          class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-slate-700 transition font-medium text-red-500">
          Logout
        </a>
      </li>
    </ul>
  </div>

  <!-- Main Content Area -->
  <main class="flex-grow mt-[8%] p-8 max-w-6xl w-full mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
      <div>
        <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">System Activity Logs</h1>
        <p class="text-slate-500 mt-1">Real-time device manipulation and system audit trailing</p>
      </div>
      <button onclick="fetchActivities()"
        class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-lg hover:shadow-slate-300/50 active:scale-95 transition-all duration-150">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-hover-spin" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H19" />
        </svg>
        Refresh Logs
      </button>
    </div>

    <!-- Activity Log Card Container -->
    <div
      class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden transition-all duration-300 hover:shadow-2xl hover:shadow-slate-200/60">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-100">
          <thead>
            <tr class="bg-slate-50/75">
              <th scope="col" class="px-8 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">
                Device Name</th>
              <th scope="col"
                class="px-8 py-4 class text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Last
                Activity</th>
              <th scope="col" class="px-8 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Done
                By</th>
              <th scope="col" class="px-8 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">
                Timestamp</th>
            </tr>
          </thead>
          <tbody id="activityTableBody" class="divide-y divide-slate-100 bg-white">
            <!-- Loading State -->
            <tr>
              <td colspan="4" class="px-8 py-16 text-center">
                <div class="flex flex-col items-center justify-center gap-3">
                  <div class="animate-spin rounded-full h-10 w-10 border-4 border-slate-200 border-t-emerald-500"></div>
                  <span class="text-sm font-semibold text-slate-500">Fetching latest smart home activities...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="services/auth/checkSession.js"></script>
  <script src="role-access-control/permissions.js"></script>
  <script src="js/layout/sidebar.js"></script>
  <script src="utils/logout.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/roomLimits.js"></script>
  <script>
    window.checkSession()
      .then(data => {
        if (!data.loggedIn) {
          window.location.href = 'index.html';
        } else if (!window.hasPermission(data.user.role, window.PERMISSIONS.VIEW_ACTIVITY_LOG)) {
          alert('Access denied: Homeowners only.');
          window.location.href = 'dashboard.html';
        } else {
          window.hideSidePanel(data.user.role);
          fetchActivities();
        }
      });

    async function fetchActivities() {
      const tbody = document.getElementById('activityTableBody');
      try {
        const response = await fetch('api/get_device_activities.php');
        const data = await response.json();

        if (!data.success) {
          tbody.innerHTML = `
            <tr>
              <td colspan="4" class="px-8 py-12 text-center text-red-500 font-medium">
                Failed to load activities: ${data.message}
              </td>
            </tr>
          `;
          return;
        }

        if (data.activities.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="4" class="px-8 py-16 text-center">
                <div class="flex flex-col items-center justify-center gap-2 text-slate-400">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 stroke-current" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                  </svg>
                  <span class="text-base font-semibold">No activity recorded yet</span>
                  <p class="text-xs">Manipulate devices in Household Management to see logs here.</p>
                </div>
              </td>
            </tr>
          `;
          return;
        }

        tbody.innerHTML = '';
        data.activities.forEach(act => {
          const badgeClass = getActivityBadgeClass(act.activity);
          const timestampFormatted = formatTimestamp(act.timestamp);

          const rowHTML = `
            <tr class="hover:bg-slate-50/50 transition duration-150 group">
              <td class="px-8 py-6 whitespace-nowrap">
                <div class="flex items-center gap-3">
                  <div class="w-2.5 h-2.5 rounded-full ${getRandomDotColor(act.device_name)}"></div>
                  <span class="font-semibold text-slate-800 group-hover:text-emerald-600 transition duration-150">${escapeHtml(act.device_name)}</span>
                </div>
              </td>
              <td class="px-8 py-6 whitespace-nowrap">
                <span class="${badgeClass}">
                  ${escapeHtml(act.activity)}
                </span>
              </td>
              <td class="px-8 py-6 whitespace-nowrap">
                <div class="flex items-center gap-2">
                  <div class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 font-bold text-xs uppercase">
                    ${escapeHtml(act.done_by.charAt(0))}
                  </div>
                  <span class="text-sm font-bold text-slate-700">${escapeHtml(act.done_by)}</span>
                </div>
              </td>
              <td class="px-8 py-6 whitespace-nowrap text-sm text-slate-500 font-medium">
                ${timestampFormatted}
              </td>
            </tr>
          `;
          tbody.insertAdjacentHTML('beforeend', rowHTML);
        });

      } catch (err) {
        console.error('Fetch activities error:', err);
        tbody.innerHTML = `
          <tr>
            <td colspan="4" class="px-8 py-12 text-center text-red-500 font-medium">
              A connection error occurred. Please try again.
            </td>
          </tr>
        `;
      }
    }

    function getActivityBadgeClass(activity) {
      const act = activity.toLowerCase();
      if (act.includes('turned on')) {
        return 'bg-emerald-500/10 text-emerald-600 border border-emerald-500/20 px-3 py-1.5 rounded-full text-xs font-bold';
      } else if (act.includes('turned off')) {
        return 'bg-slate-500/10 text-slate-600 border border-slate-500/20 px-3 py-1.5 rounded-full text-xs font-bold';
      } else if (act.includes('added')) {
        return 'bg-cyan-500/10 text-cyan-600 border border-cyan-500/20 px-3 py-1.5 rounded-full text-xs font-bold';
      } else if (act.includes('edited')) {
        return 'bg-amber-500/10 text-amber-600 border border-amber-500/20 px-3 py-1.5 rounded-full text-xs font-bold';
      } else if (act.includes('removed')) {
        return 'bg-rose-500/10 text-rose-600 border border-rose-500/20 px-3 py-1.5 rounded-full text-xs font-bold';
      }
      return 'bg-blue-500/10 text-blue-600 border border-blue-500/20 px-3 py-1.5 rounded-full text-xs font-bold';
    }

    function getRandomDotColor(name) {
      const colors = ['bg-indigo-400', 'bg-blue-400', 'bg-violet-400', 'bg-purple-400', 'bg-pink-400', 'bg-teal-400'];
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      const index = Math.abs(hash) % colors.length;
      return colors[index];
    }

    function formatTimestamp(timestampStr) {
      try {
        const date = new Date(timestampStr.replace(/-/g, '/')); // Compatibility with PHP ISO/ANSI SQL formats
        if (isNaN(date.getTime())) return timestampStr;

        return date.toLocaleDateString('en-US', {
          month: 'short',
          day: 'numeric',
          year: 'numeric'
        }) + ' at ' + date.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      } catch (e) {
        return timestampStr;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
    window.addEventListener("load", async () => {
      checkRoomLimits();
    });
  </script>
</body>

</html>
